<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 行业日报 · GitHub Pages</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 50%, #dbeafe 100%);
  color: #0f172a;
  display: flex;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 260px;
  min-width: 260px;
  height: 100vh;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border-right: 1px solid rgba(186, 230, 253, 0.6);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  overflow-y: auto;
}
.sidebar h1 {
  font-size: 20px;
  color: #0c4a6e;
  margin-bottom: 6px;
}
.sidebar .sub {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 20px;
}
.nav-list { display: flex; flex-direction: column; gap: 8px; }
.nav-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid rgba(186, 230, 253, 0.5);
  border-radius: 12px;
  text-decoration: none; color: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
}
.nav-item:hover, .nav-item.active {
  background: rgba(14, 165, 233, 0.12);
  border-color: rgba(14, 165, 233, 0.5);
  transform: translateX(2px);
}
.nav-item .title { font-weight: 600; color: #0369a1; font-size: 14px; }
.nav-item .meta { font-size: 12px; color: #64748b; }
.nav-item.active .title { color: #0c4a6e; }

/* Main */
.main {
  flex: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.topbar {
  display: none;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(186, 230, 253, 0.6);
  align-items: center;
  gap: 10px;
}
.menu-btn {
  background: rgba(14, 165, 233, 0.12);
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  color: #0369a1;
  font-weight: 600;
  cursor: pointer;
}
.topbar h1 { font-size: 16px; color: #0c4a6e; }

iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: rgba(255, 255, 255, 0.4);
}

footer {
  padding: 12px 16px;
  text-align: center;
  font-size: 11px;
  color: #94a3b8;
  background: rgba(255, 255, 255, 0.5);
  border-top: 1px solid rgba(186, 230, 253, 0.4);
}

/* Mobile */
@media (max-width: 720px) {
  body { flex-direction: column; }
  .sidebar {
    position: fixed;
    left: 0; top: 0;
    transform: translateX(-100%);
    z-index: 100;
    box-shadow: 4px 0 24px rgba(0,0,0,0.08);
    transition: transform 0.25s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .topbar { display: flex; }
  .main { height: 100vh; }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.25);
    z-index: 99;
  }
  .overlay.show { display: block; }
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<aside class="sidebar" id="sidebar">
  <h1>AI 行业日报</h1>
  <div class="sub">最近更新 · 保留最近 7 天</div>
  <nav class="nav-list" id="nav"></nav>
</aside>

<main class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleMenu()">☰ 目录</button>
    <h1>AI 行业日报</h1>
  </div>
  <iframe id="viewer" src="reports/day-7.html"></iframe>
  <footer>由 QoderWork 自动生成 · 内容仅供研究参考</footer>
</main>

<script>
// ==== NAV_DATA_START ====
const NAV_DATA = [
  {slot: 6, date: '2026-06-27', title: 'AI行业日报', weekday: '周六'},
  {slot: 7, date: '2026-06-28', title: 'AI行业日报', weekday: '周日'},
];
// ==== NAV_DATA_END ====

const nav = document.getElementById('nav');
const viewer = document.getElementById('viewer');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

function loadSlot(slot) {
  viewer.src = `reports/day-${slot}.html`;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector(`.nav-item[data-slot="${slot}"]`);
  if (active) active.classList.add('active');
  if (window.innerWidth <= 720) closeMenu();
}

NAV_DATA.forEach(item => {
  const a = document.createElement('a');
  a.className = 'nav-item';
  a.dataset.slot = item.slot;
  a.innerHTML = `<span class="title">${item.title}</span><span class="meta">${item.date} · ${item.weekday}</span>`;
  a.onclick = (e) => { e.preventDefault(); loadSlot(item.slot); };
  nav.appendChild(a);
});

// Default to latest slot
const latest = Math.max(...NAV_DATA.map(i => i.slot));
loadSlot(latest);

function toggleMenu() {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}
function closeMenu() {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}
</script>

</body>
</html>
